version: 2
distribution_spec:
  description: Quick start template for running Llama Stack with several popular providers
  providers:
    inference:
    - remote::openai
    - remote::fireworks
    - remote::together
    - remote::ollama
    - remote::anthropic
    - remote::gemini
    - remote::groq
    - remote::sambanova
    - remote::vllm
    - remote::tgi
    - remote::cerebras
    - remote::llama-openai-compat
    - remote::nvidia
    - remote::hf::serverless
    - remote::hf::endpoint
    - remote::bedrock
    - remote::passthrough
    - inline::sentence-transformers
    vector_io:
    - inline::sqlite-vec
    - remote::chromadb
    - remote::pgvector
    files:
    - inline::localfs
    safety:
    - inline::llama-guard
    agents:
    - inline::meta-reference
    telemetry:
    - inline::meta-reference
    post_training:
    - inline::huggingface
    eval:
    - inline::meta-reference
    datasetio:
    - remote::huggingface
    - inline::localfs
    scoring:
    - inline::basic
    - inline::llm-as-judge
    - inline::braintrust
    tool_runtime:
    - remote::brave-search
    - remote::tavily-search
    - inline::rag-runtime
    - remote::model-context-protocol
image_type: conda
additional_pip_packages:
- aiosqlite
- asyncpg
- sqlalchemy[asyncio]
